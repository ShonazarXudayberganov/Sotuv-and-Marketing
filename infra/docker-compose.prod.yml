name: nexus-ai-prod

# Production-style compose file. Pulls images from GHCR (set via env vars
# API_IMAGE / WEB_IMAGE in the deploy script). For local dev keep using
# `docker-compose.yml`.

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: nexus_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexus_redis_prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data

  api:
    image: ${API_IMAGE:-ghcr.io/shonazarxudayberganov/sotuv-and-marketing/api:latest}
    container_name: nexus_api_prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexus}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: ${WEB_IMAGE:-ghcr.io/shonazarxudayberganov/sotuv-and-marketing/web:latest}
    container_name: nexus_web_prod
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    container_name: nexus_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
