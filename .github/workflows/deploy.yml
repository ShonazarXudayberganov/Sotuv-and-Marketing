name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.event.inputs.target || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    name: Build & push container images
    runs-on: ubuntu-latest
    outputs:
      api_image: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
      web_image: ghcr.io/${{ github.repository }}/web:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
            ghcr.io/${{ github.repository }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  deploy-staging:
    name: Deploy to staging
    needs: build-images
    if: github.event.inputs.target != 'production'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: SSH and roll
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/nexus
            export API_IMAGE=${{ needs.build-images.outputs.api_image }}
            export WEB_IMAGE=${{ needs.build-images.outputs.web_image }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T api alembic upgrade head

  deploy-production:
    name: Deploy to production
    needs: build-images
    if: github.event.inputs.target == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Manual approval
        run: echo "Approved via GitHub Environment protection rules"
      - name: SSH and roll
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/nexus
            export API_IMAGE=${{ needs.build-images.outputs.api_image }}
            export WEB_IMAGE=${{ needs.build-images.outputs.web_image }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T api alembic upgrade head
